services:
  neo4j:
    image: neo4j:4.4
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/palimpedia_dev
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  neo4j_test:
    image: neo4j:4.4
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/palimpedia_test
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_test_data:/data

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_test_data:
